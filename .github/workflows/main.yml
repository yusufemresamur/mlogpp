name: Build
on: [push]

env:
  BAZELISK_VERSION: "1.29.0"

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: llvm
            flags: ""
          - name: gcc
            flags: "--config=gcc"
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-bazel
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
    - name: Build
      run: bazelisk build ${{ matrix.flags }} //...

  example:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-bazel
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
    - name: Run example
      run: bazelisk run //examples:example

  test:
    needs: build
    strategy:
      matrix:
        include:
          - name: llvm
            flags: ""
          - name: gcc
            flags: "--config=gcc"
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-bazel
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
    - name: Test
      run: bazelisk test ${{ matrix.flags }} //...

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-bazel
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
    - name: Run coverage
      run: |
        bazelisk coverage \
          --config=gcc \
          --combined_report=lcov \
          --instrumentation_filter=//src \
          //test/...
        cp "$(bazelisk info output_path)/_coverage/_coverage_report.dat" coverage.lcov
    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: coverage.lcov
        token: ${{ secrets.CODECOV_TOKEN }}
