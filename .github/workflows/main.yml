name: Bazel build
on: [push]

env:
  BAZELISK_VERSION: "1.29.0"

jobs:
  Checkout:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
  Prepare:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: abhinavsingh/setup-bazel@v3
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
  Build:
    runs-on: ubuntu-latest
    needs: [Checkout, Prepare]
    steps:
    - name: Bazel build
      run: bazelisk build //...
          
