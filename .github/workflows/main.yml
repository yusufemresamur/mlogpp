name: Build
on: [push]

env:
  BAZELISK_VERSION: "1.29.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: Bazel build
      run: bazelisk build //...

  example:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run example
      run: bazelisk run //examples:example
  tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: "Compile and run tests"
      run: bazelisk test //...

  build-gcc:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: Bazel build (GCC)
      run: bazelisk build --config=gcc //...

