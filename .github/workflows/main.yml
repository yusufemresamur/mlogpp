name: Build
on: [push]

env:
  BAZELISK_VERSION: "1.29.0"

jobs:
  build-llvm:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: Bazel build (LLVM)
      run: bazelisk build //...

  build-gcc:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: Bazel build (GCC)
      run: bazelisk build --config=gcc //...

  example:
    needs: build-llvm
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run example
      run: bazelisk run //examples:example
  
  tests-llvm:
    needs: build-llvm
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: "Compile and run tests (LLVM)"
      run: bazelisk test //...

  tests-gcc:
    needs: build-gcc
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: "Compile and run tests (GCC)"
      run: bazelisk test --config=gcc //...

  coverage:
    needs: tests-gcc
    runs-on: ubuntu-latest
    steps:
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-version: ${{ env.BAZELISK_VERSION }}
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run coverage
      run: |
        bazelisk coverage \
          --config=gcc \
          --combined_report=lcov \
          --instrumentation_filter=//src \
          //test/...
        cp "$(bazelisk info output_path)/_coverage/_coverage_report.dat" coverage.lcov
    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: coverage.lcov
        token: ${{ secrets.CODECOV_TOKEN }}

